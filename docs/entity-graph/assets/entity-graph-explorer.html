<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entity Graph Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
  <style>
    /* ── CSS custom properties (light defaults, overridden by theme detection) ── */
    :root {
      --bg-color: #ffffff;
      --text-color: #212121;
      --edge-color: #999999;
      --sidebar-bg: #f5f5f5;
      --header-bg: #fafafa;
      --border-color: #e0e0e0;
      --label-color: #555555;
      --hull-opacity: 0.08;
    }

    /* ── Type color palette ── */
    :root {
      --color-user:    #4285f4;
      --color-ip:      #34a853;
      --color-host:    #fa7b17;
      --color-process: #9334e6;
      --color-file:    #f9ab00;
      --color-domain:  #00bcd4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 8px 14px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    #header label {
      font-size: 13px;
      font-weight: 600;
      color: var(--label-color);
      white-space: nowrap;
    }

    #scenario-select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
      cursor: pointer;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .filter-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-item input[type="checkbox"] {
      cursor: pointer;
    }

    /* ── Main area ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── SVG container ── */
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      min-height: 500px;
      display: block;
      cursor: grab;
    }

    #graph-svg:active {
      cursor: grabbing;
    }

    /* ── Node styles ── */
    .node circle {
      r: 12;
      stroke-width: 2px;
      transition: opacity 0.2s;
    }

    .node text {
      font-size: 10px;
      fill: var(--text-color);
      text-anchor: middle;
      pointer-events: none;
      dominant-baseline: hanging;
    }

    .node.hidden {
      display: none;
    }

    /* ── Edge styles ── */
    .edge-line {
      stroke: var(--edge-color);
      stroke-width: 1.5px;
      fill: none;
    }

    .edge-line.anomalous {
      stroke: #e53935;
      stroke-width: 3px;
    }

    .edge-label {
      font-size: 9px;
      fill: var(--label-color);
      text-anchor: middle;
      pointer-events: none;
    }

    /* ── Community hull styles ── */
    .hull {
      fill-opacity: var(--hull-opacity);
      stroke-width: 1px;
      stroke-dasharray: 4 3;
    }

    /* ── Pulsing animation for anomalous nodes/edges ── */
    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .anomalous {
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border-color);
      padding: 14px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-color);
      line-height: 1;
    }

    #sidebar h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      padding-right: 24px;
    }

    .entity-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .type-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-color);
      margin-bottom: 2px;
    }

    .detail-value {
      font-size: 12px;
      word-break: break-all;
    }

    #edge-list {
      margin-top: 10px;
    }

    #edge-list h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-color);
      margin-bottom: 6px;
    }

    .edge-item {
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 3px;
      margin-bottom: 3px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
    }

    .edge-item.anomalous-edge {
      border-color: #e53935;
      color: #e53935;
    }

    /* ── Footer ── */
    #footer {
      padding: 5px 14px;
      font-size: 11px;
      color: var(--label-color);
      background: var(--header-bg);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
      text-align: center;
    }
  </style>
</head>

        Process

        <input type="checkbox" data-type="File" checked />

      </div>
      <div class="detail-row">

      <div class="detail-row">

      </div>
      <div class="detail-row">

      </div>
      <div class="detail-row">

  </div>

// ============================================================
// THEME DETECTION
// ============================================================
function applyTheme() {
  const root = document.documentElement;
  let isDark = false;

  // Check prefers-color-scheme
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    isDark = true;
  }

  // Check parent iframe data-md-color-scheme (MkDocs Material)
  try {
    const parentBody = window.parent.document.body;
    const scheme = parentBody && parentBody.getAttribute('data-md-color-scheme');
    if (scheme === 'slate') isDark = true;
    if (scheme === 'default') isDark = false;
  } catch (_) {
    // Cross-origin — ignore
  }

  if (isDark) {
    root.style.setProperty('--bg-color',     '#1e1e1e');
    root.style.setProperty('--text-color',   '#e0e0e0');
    root.style.setProperty('--edge-color',   '#777777');
    root.style.setProperty('--sidebar-bg',   '#2a2a2a');
    root.style.setProperty('--header-bg',    '#252525');
    root.style.setProperty('--border-color', '#3a3a3a');
    root.style.setProperty('--label-color',  '#aaaaaa');
  } else {
    root.style.setProperty('--bg-color',     '#ffffff');
    root.style.setProperty('--text-color',   '#212121');
    root.style.setProperty('--edge-color',   '#999999');
    root.style.setProperty('--sidebar-bg',   '#f5f5f5');
    root.style.setProperty('--header-bg',    '#fafafa');
    root.style.setProperty('--border-color', '#e0e0e0');
    root.style.setProperty('--label-color',  '#555555');
  }
}

applyTheme();

// Listen for OS-level theme change
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
}

// Poll parent for MkDocs Material theme changes (every 2s)
setInterval(() => {
  try {
    const parentBody = window.parent.document.body;
    if (parentBody) applyTheme();
  } catch (_) {}
}, 2000);

      { source: 'h-compromised', target: 'h-scan-10',  rel_type: 'port_scan', anomalous: true },
      { source: 'h-compromised', target: 'h-scan-11',  rel_type: 'port_scan', anomalous: true },
      { source: 'h-compromised', target: 'h-scan-12',  rel_type: 'port_scan', anomalous: true },
      { source: 'h-compromised', target: 'h-dns1',     rel_type: 'port_scan', anomalous: true },
    ],
  },
};


// ============================================================
// GRAPH STATE
// ============================================================
let simulation = null;
let activeFilters = new Set(['User', 'IP', 'Host', 'Process', 'File', 'Domain']);
let currentScenario = 'normal';

const svg = d3.select('#graph-svg');
const container = document.getElementById('graph-container');

// Main group for zoom/pan transform
const g = svg.append('g').attr('class', 'graph-root');
const hullLayer  = g.append('g').attr('class', 'hulls');
const edgeLayer  = g.append('g').attr('class', 'edges');
const nodeLabelLayer = g.append('g').attr('class', 'node-labels');
const nodeLayer  = g.append('g').attr('class', 'nodes');


// ============================================================
// ZOOM / PAN
// ============================================================
const zoomBehavior = d3.zoom()
  .scaleExtent([0.3, 5])
  .on('zoom', (event) => {
    g.attr('transform', event.transform);
  });

svg.call(zoomBehavior);

// Click on SVG background → close sidebar
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.classList.contains('graph-root')) {
    closeSidebar();
  }
});


// ============================================================
// COMMUNITY HULL COLORS
// ============================================================
const COMMUNITY_COLORS = ['#4285f4', '#fa7b17', '#34a853', '#9334e6', '#f9ab00', '#00bcd4'];

function communityColor(id) {
  return COMMUNITY_COLORS[id % COMMUNITY_COLORS.length];
}


// ============================================================
// DRAW GRAPH
// ============================================================
function getSize() {
  const rect = container.getBoundingClientRect();
  return { width: rect.width || 800, height: rect.height || 600 };
}

function loadScenario(key) {
  currentScenario = key;
  const raw = SCENARIOS[key];

  // Deep-copy to avoid D3 mutating the originals
  const allNodes = raw.nodes.map(n => ({ ...n }));
  const allEdges = raw.edges.map(e => ({ ...e }));

  // Filter nodes and edges by active type filters
  const visibleNodes = allNodes.filter(n => activeFilters.has(n.type));
  const visibleIdSet = new Set(visibleNodes.map(n => n.id));
  const visibleEdges = allEdges.filter(
    e => visibleIdSet.has(e.source) && visibleIdSet.has(e.target)
  );

  // Build adjacency for sidebar
  const edgeIndex = buildEdgeIndex(allEdges);

  drawGraph(visibleNodes, visibleEdges, allNodes, edgeIndex);
}

function buildEdgeIndex(edges) {
  const idx = {};
  edges.forEach(e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    if (!idx[src]) idx[src] = [];
    if (!idx[tgt]) idx[tgt] = [];
    idx[src].push({ rel_type: e.rel_type, other: tgt, anomalous: !!e.anomalous });
    idx[tgt].push({ rel_type: e.rel_type, other: src, anomalous: !!e.anomalous });
  });
  return idx;
}

function drawGraph(nodes, edges, allNodes, edgeIndex) {
  // Stop any running simulation
  if (simulation) simulation.stop();

  // Clear layers
  hullLayer.selectAll('*').remove();
  edgeLayer.selectAll('*').remove();
  nodeLabelLayer.selectAll('*').remove();
  nodeLayer.selectAll('*').remove();

  const { width, height } = getSize();

  // ── Edges ──
  const edgeSel = edgeLayer.selectAll('.edge-group')
    .data(edges)
    .join('g')
    .attr('class', 'edge-group');

  const edgeLine = edgeSel.append('line')
    .attr('class', d => 'edge-line' + (d.anomalous ? ' anomalous' : ''));

  const edgeLabel = edgeSel.append('text')
    .attr('class', 'edge-label')
    .text(d => d.rel_type);

  // ── Nodes ──
  const nodeSel = nodeLayer.selectAll('.node')
    .data(nodes, d => d.id)
    .join('g')
    .attr('class', d => 'node' + (d.anomalous ? ' anomalous' : ''))
    .call(dragBehavior());

  nodeSel.append('circle')
    .attr('r', 12)
    .attr('fill', d => colorFor(d.type))
    .attr('stroke', d => d3.color(colorFor(d.type)).darker(0.8))
    .attr('stroke-width', 2);

  nodeSel.on('click', (event, d) => {
    event.stopPropagation();
    openSidebar(d, allNodes, edgeIndex);
  });

  // ── Node labels ──
  const labelSel = nodeLabelLayer.selectAll('.node-label')
    .data(nodes, d => d.id)
    .join('text')
    .attr('class', 'node-label')
    .attr('font-size', 10)
    .attr('fill', 'var(--text-color)')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging')
    .attr('pointer-events', 'none')
    .text(d => d.label.length > 15 ? d.label.slice(0, 14) + '…' : d.label);

  // ── Community hulls ──
  function updateHulls() {
    const byComm = d3.group(nodes, d => d.community);
    const hullData = [];
    byComm.forEach((members, commId) => {
      if (members.length < 3) return;
      const pts = members.map(d => [d.x || 0, d.y || 0]);
      const hull = d3.polygonHull(pts);
      if (hull) hullData.push({ commId, hull });
    });

    hullLayer.selectAll('.hull')
      .data(hullData, d => d.commId)
      .join('path')
      .attr('class', 'hull')
      .attr('d', d => 'M' + d.hull.map(p => p.join(',')).join('L') + 'Z')
      .attr('fill', d => communityColor(d.commId))
      .attr('stroke', d => communityColor(d.commId));
  }

  // ── Simulation ──
  simulation = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(edges).id(d => d.id).distance(80))
    .force('charge',  d3.forceManyBody().strength(-200))
    .force('center',  d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide(20))
    .on('tick', () => {
      // Update edge positions
      edgeLine
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      // Update edge label positions and rotation
      edgeLabel
        .attr('x', d => (d.source.x + d.target.x) / 2)
        .attr('y', d => (d.source.y + d.target.y) / 2)
        .attr('transform', d => {
          const dx = d.target.x - d.source.x;
          const dy = d.target.y - d.source.y;
          const angle = Math.atan2(dy, dx) * 180 / Math.PI;
          const mx = (d.source.x + d.target.x) / 2;
          const my = (d.source.y + d.target.y) / 2;
          return `rotate(${angle},${mx},${my})`;
        });

      // Update node and label positions
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
      labelSel.attr('x', d => d.x).attr('y', d => d.y + 14);

      // Recompute hulls
      updateHulls();
    });

  // Reset zoom to fit
  svg.transition().duration(300).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(0, 0).scale(1)
  );
}


// ============================================================
// DRAG BEHAVIOR
// ============================================================
function dragBehavior() {
  return d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on('drag', (event, d) => {
      d.fx = event.x;
      d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    });
}


// ============================================================
// SIDEBAR
// ============================================================
const sidebar = document.getElementById('sidebar');

function openSidebar(node, allNodes, edgeIndex) {
  const nodeMap = new Map(allNodes.map(n => [n.id, n]));

  document.getElementById('sidebar-title').textContent = 'Entity Details';

  const dot = document.getElementById('sidebar-type-dot');
  dot.style.background = colorFor(node.type);
  document.getElementById('sidebar-type-label').textContent = node.type;

  document.getElementById('sd-label').textContent = node.label;
  document.getElementById('sd-uuid').textContent = node.uuid ? node.uuid.slice(0, 18) + '…' : '—';
  document.getElementById('sd-community').textContent = node.community !== undefined ? `Community ${node.community}` : '—';
  document.getElementById('sd-betweenness').textContent = typeof node.betweenness === 'number' ? node.betweenness.toFixed(2) : '—';
  document.getElementById('sd-pagerank').textContent = typeof node.pagerank === 'number' ? node.pagerank.toFixed(4) : '—';
  document.getElementById('sd-fanout').textContent = typeof node.fanout === 'number' ? node.fanout : '—';

  const edgesContainer = document.getElementById('sd-edges');
  edgesContainer.innerHTML = '';
  const connected = edgeIndex[node.id] || [];
  if (connected.length === 0) {
    edgesContainer.innerHTML = '<div style="font-size:11px;color:var(--label-color)">No edges</div>';
  } else {
    connected.forEach(e => {
      const other = nodeMap.get(e.other);
      const otherLabel = other ? other.label : e.other;
      const div = document.createElement('div');
      div.className = 'edge-item' + (e.anomalous ? ' anomalous-edge' : '');
      div.textContent = `${e.rel_type} → ${otherLabel}`;
      edgesContainer.appendChild(div);
    });
  }

  sidebar.classList.add('open');
}

function closeSidebar() {
  sidebar.classList.remove('open');
}

document.getElementById('sidebar-close').addEventListener('click', closeSidebar);


// ============================================================
// FILTERS
// ============================================================
document.querySelectorAll('#filter-group input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    if (cb.checked) {
      activeFilters.add(cb.dataset.type);
    } else {
      activeFilters.delete(cb.dataset.type);
    }
    loadScenario(currentScenario);
  });
});


// ============================================================
// SCENARIO DROPDOWN
// ============================================================
document.getElementById('scenario-select').addEventListener('change', (e) => {
  loadScenario(e.target.value);
  closeSidebar();
});


// ============================================================
// RESIZE HANDLER
// ============================================================
const resizeObserver = new ResizeObserver(() => {
  if (simulation) {
    const { width, height } = getSize();
    simulation.force('center', d3.forceCenter(width / 2, height / 2));
    simulation.alpha(0.1).restart();
  }
});
resizeObserver.observe(container);


// ============================================================
// INITIAL LOAD
// ============================================================
loadScenario('normal');
</script>
</body>
</html>
