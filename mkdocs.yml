site_name: Seerflow Guide
site_url: https://docs.seerflow.dev
site_description: "Comprehensive guide to Seerflow — streaming log intelligence"
repo_url: https://github.com/seerflow/seerflow
repo_name: seerflow/seerflow

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Security Primer:
    - security-primer/index.md
    - What is a SIEM?: security-primer/siem-basics.md
    - MITRE ATT&CK: security-primer/mitre-attack.md
    - Cyber Kill Chain: security-primer/kill-chain.md
    - IOCs & Entities: security-primer/iocs-entities.md
    - Sigma Rules: security-primer/sigma-rules.md
    - Anomaly Detection: security-primer/anomaly-detection.md
  - Ops Primer:
    - ops-primer/index.md
    - Failure Patterns: ops-primer/failure-patterns.md
    - Deployment Risk: ops-primer/deployment-risk.md
    - Ops Correlation: ops-primer/ops-correlation.md
  - Architecture:
    - architecture/index.md
    - Pipeline: architecture/pipeline.md
    - Receivers: architecture/receivers.md
    - Parsing: architecture/parsing.md
    - Event Model: architecture/event-model.md
  - Entity Graph:
    - entity-graph/index.md
    - Building the Graph: entity-graph/construction.md
    - Algorithms & Detection: entity-graph/algorithms.md
  - Detection:
    - detection/index.md
    - Half-Space Trees: detection/hst.md
    - Holt-Winters: detection/holt-winters.md
    - CUSUM: detection/cusum.md
    - Markov Chains: detection/markov.md
    - DSPOT: detection/dspot.md
    - Scoring & Attack Mapping: detection/scoring.md
  - Correlation:
    - correlation/index.md
    - Sigma Rules: correlation/sigma.md
    - Correlation Engine: correlation/engine.md
    - Kill Chain: correlation/kill-chain.md
    - Risk Accumulation: correlation/risk-accumulation.md
    - Graph-Structural: correlation/graph-structural.md
  - Operations:
    - operations/index.md
    - Alerting: operations/alerting.md
    - Storage: operations/storage.md
    - Tuning: operations/tuning.md
    - Testing: operations/testing.md
  - Reference:
    - Configuration: reference/config.md
    - CLI: reference/cli.md
    - Bundled Sigma Rules: reference/sigma-rules.md
    - ATT&CK Coverage: reference/attack-coverage.md
    - Glossary: reference/glossary.md

plugins:
  - search
  - privacy:
      assets_exclude:
        - cdn.jsdelivr.net/npm/mathjax@3/*
  - tags

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
      base_path:
        - docs
      check_paths: true

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/viz.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/seerflow/seerflow

extra_javascript:
  - assets/javascripts/d3.v7.min.js
  - assets/javascripts/plotly-cartesian.min.js
  - assets/javascripts/viz/theme.js
  - assets/javascripts/viz/entity-graph.js
  - assets/javascripts/viz/plotly-charts.js
  - assets/javascripts/viz/init.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
